version: '3.8'

services:
  # MySQL database service for local development container setup
  db:
    image: mysql:8.0
    container_name: local_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: github_analyzer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Express REST API container service
  api:
    build: .
    container_name: github_profile_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=github_analyzer
      # Optionally uncomment and supply a GitHub Token to avoid limits
      # - GITHUB_TOKEN=your_personal_access_token
    depends_on:
      - db

volumes:
  mysql_data:
